# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

# Architektur-Importgrenze (no-architecture-fitness-lint): Die Presentation-
# Schicht (lib/screens/**) importiert NICHT direkt aus lib/services/**.
# Der Dart-Analyzer kann diese Grenze nicht ausdruecken; sie wird stattdessen
# von tool/check_layering.dart geprueft (in .github/workflows/ci.yml erzwungen).
# Bewusste Ausnahmen werden dort gewhitelistet.

analyzer:
  # Quality Gate scharf halten: tote/ungenutzte Symbole brechen den Build,
  # statt nur als Hinweis durchzurutschen (CLAUDE.md: keine CI -> jetzt via
  # .github/workflows/ci.yml erzwungen).
  errors:
    unused_element: error
    unused_import: error
    unused_local_variable: error
    dead_code: error

linter:
  # Ergaenzt flutter_lints um eine konservative, rauscharme Auswahl an
  # Korrektheits-/Sicherheits-Regeln. Stil-lastige Regeln (prefer_const_*,
  # require_trailing_commas) sind bewusst NICHT aktiv, um keinen grossen
  # Format-Diff ueber die ~45k LOC zu erzwingen -- siehe Welle 2 im Plan.
  rules:
    avoid_empty_else: true
    avoid_print: true
    avoid_relative_lib_imports: true
    avoid_returning_null_for_future: true
    avoid_type_to_string: true
    collection_methods_unrelated_type: true
    no_duplicate_case_values: true
    prefer_void_to_null: true
    throw_in_finally: true
    unnecessary_statements: true
    valid_regexps: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
