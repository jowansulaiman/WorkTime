       viewBox auf das tatsächliche Emblem-Zentrum (~559,314) zentriert. -->
  <rect x="239" y="-6" width="640" height="640" fill="#13161B"/>
  <g>
    <!-- großer Bogen (Gold für Kontrast auf Anthrazit) -->
    <path d="M 372.46 217.50 A 205.00 205.00 0 0 1 744.97 383.35" fill="none" stroke="#D4A85A" stroke-width="48" stroke-linecap="round"/>
