    <!-- Ziffernmarken auf der hellen Scheibe (Anthrazit) -->
    <line x1="606.00" y1="320.00" x2="618.00" y2="320.00" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <line x1="589.60" y1="359.60" x2="598.08" y2="368.08" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <line x1="550.00" y1="376.00" x2="550.00" y2="388.00" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <line x1="510.40" y1="359.60" x2="501.92" y2="368.08" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <line x1="494.00" y1="320.00" x2="482.00" y2="320.00" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <line x1="510.40" y1="280.40" x2="501.92" y2="271.92" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <line x1="550.00" y1="264.00" x2="550.00" y2="252.00" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <line x1="589.60" y1="280.40" x2="598.08" y2="271.92" stroke="#13161B" stroke-width="8" stroke-linecap="round"/>
    <!-- Zeiger -->
    <line x1="550" y1="320" x2="553.83" y2="276.17" stroke="#13161B" stroke-width="14" stroke-linecap="round"/>
    <line x1="550" y1="320" x2="574.57" y2="302.79" stroke="#9B7839" stroke-width="10" stroke-linecap="round"/>
    <circle cx="550" cy="320" r="13" fill="#13161B"/>
    <!-- Team (auf Anthrazit → Gold, mittlerer Punkt Champagne) -->
    <circle cx="506" cy="468" r="11" fill="#D4A85A"/>
    <circle cx="550" cy="456" r="11" fill="#E8C781"/>
    <circle cx="594" cy="468" r="11" fill="#D4A85A"/>
