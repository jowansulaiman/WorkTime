<svg xmlns="http://www.w3.org/2000/svg" viewBox="239 -6 640 640" width="1024" height="1024">
  <!-- App-Launcher-Icon: Marken-Emblem (Uhr + Team) auf AllTec-Anthrazit.
       Wortmarke bewusst weggelassen (bei Icon-Größe unleserlich).
