    <rect x="489.88" y="512.23" width="42" height="18" rx="9" fill="#E8C781" transform="rotate(191.00 510.88 521.23)"/>
    <rect x="421.35" y="482.93" width="34" height="18" rx="9" fill="#E8C781" transform="rotate(213.00 438.35 491.93)"/>
    <!-- Uhrenscheibe (hell) -->
