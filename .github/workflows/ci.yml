name: CI

# Quality Gates aus CLAUDE.md ("Definition of Done"): flutter analyze + flutter test.
# Bisher hingen diese komplett an manueller Disziplin vor dem Commit – jetzt erzwungen.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Laufende Runs auf demselben Branch abbrechen, wenn neue Commits kommen.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test
        # Hinweis: Bestandsdateien mit Format-Drift werden separat in einer eigenen
        # Welle bereinigt; dieser Schritt darf anfangs als nicht blockierend laufen.
        continue-on-error: true

      - name: Analyze
        run: flutter analyze

      - name: Architecture layering check
        run: dart run tool/check_layering.dart

      - name: Run tests
        run: flutter test

  functions-lint:
    name: Cloud Functions syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Syntax check (index.js)
        working-directory: functions
        run: node --check index.js
