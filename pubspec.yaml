name: worktime_app
description: Arbeitszeiterfassung App – Monatsbericht & PDF-Export

publish_to: 'none'

version: 1.0.0+1

environment:
  # Auf >=3.7.0 angehoben fuer mobile_scanner ^7 (verlangt Dart >= 3.7 /
  # Flutter >= 3.29). Installierte Toolchain (Dart 3.12) erfuellt das.
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Web-URL-Strategie (PathUrlStrategy); Teil des Flutter-SDK, keine Versionsaufl.
  flutter_web_plugins:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Lokale Persistenz
  shared_preferences: ^2.5.3
  
  # PDF Export
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # Datums-Picker
  table_calendar: ^3.0.9
  
  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  # DATEV-3: SHA-256 der Export-Datei (Historie/Reproduktion). Bisher nur
  # transitiv aufgelöst — als direkte Abhängigkeit gepinnt.
  crypto: ^3.0.7
  fl_chart: ^0.67.0
  
  # File Saver
  path_provider: ^2.1.2
  share_plus: ^9.0.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.1.0
  # Dokumenten-Upload der digitalen Personalakte (PA-3). 12.2.x ist die zur
  # aktuellen firebase_core ^3.4.0-/web ^0.5-Linie passende Version (12.3+ zieht
  # web ^1.0, 13.x verlangt firebase_core ^4).
  firebase_storage: ^12.2.0
  # App Check: Bot-/Abuse-Schutz für den öffentlichen Schreibpfad (/wunsch).
  # Aktivierung nur, wenn ein reCAPTCHA-Key per dart-define gesetzt ist
  # (APP_APPCHECK_RECAPTCHA_KEY) — sonst No-op. Enforcement zusätzlich in der
  # Firebase-Console schalten.
  firebase_app_check: ^0.3.1
  # Push-Benachrichtigungen (FCM, M1: nur Geräte-Token-Registrierung).
  # 15.1.0 ist die zu firebase_core ^3.4.0 passende Linie — 16.x verlangt
  # firebase_core ^4 (Major-Bump, NICHT ziehen).
  firebase_messaging: ^15.1.0
  # Foreground-Anzeige (firebase_messaging zeigt im Vordergrund nichts) +
  # Android-Notification-Channels (M4). Dart-SDK ^3.4.0 (vorhanden: 3.12.x).
  flutter_local_notifications: ^19.0.0
  google_sign_in: ^7.2.0
  uuid: ^4.5.3
  collection: ^1.19.1
  web: ^0.5.1
  flutter_svg: ^2.2.4

  # Barcode/EAN-Scanner (nur Handy sichtbar, siehe ScannerScreen).
  # v7 nutzt Apple Vision statt MLKit -> kein GTMSessionFetcher-Pod-Konflikt
  # mit firebase_core ^3 / cloud_functions ^5. NICHT auf <=6.x downgraden.
  mobile_scanner: ^7.2.0

  # Kurze WAV-Toene fuer Scan-Erfolg/-Fehler (zwei unterscheidbare Toene;
  # SystemSound liefert nur einen Ton und ist auf Web stumm).
  audioplayers: ^6.7.1

  # Foto-Fallback des Scanners: Standbild in voller Aufloesung aufnehmen und
  # via mobile_scanner analyzeImage auswerten (beschaedigte/winzige Codes).
  # Kamera-Permissions existieren bereits fuer mobile_scanner.
  image_picker: ^1.2.1
  go_router: ^17.3.0
  quick_actions: ^1.1.0

  # Bildschirm wach halten für den Arbeitsmodus/Kiosk (Laden-Tablet, Always-On).
  # No-op auf nicht unterstützten Plattformen; nur im Kiosk-Build aktiviert.
  wakelock_plus: ^1.2.8
  connectivity_plus: ^7.2.0
  url_launcher: ^6.3.2
  local_auth: ^3.0.1
  permission_handler: ^12.0.3
  file_picker: ^8.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  fake_cloud_firestore: ^3.1.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoSans-Italic.ttf
    # In-App-Doku (Bereich „Wissen"): Manifest + Markdown-Artikel. Werden zur
    # Laufzeit via rootBundle geladen (DocRepository). Web-Doku-Site liest
    # dieselben Quellen (scripts/build-docs-site.mjs).
    - docs/manifest.json
    - docs/mitarbeiter/
    - docs/entwickler/
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSans-Italic.ttf
          style: italic

# App-Launcher-Icons (Marken-Emblem statt Flutter-Default).
# Quellen: assets/icon/*.svg → gerendert nach assets/icon/*.png.
# Neu generieren nach Icon-Änderung:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  # iOS + Android-Legacy (<API 26): undurchsichtiges Vollbild-Icon (AllTec-
  # Anthrazit, kein Alpha — iOS verlangt das).
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#13161B"
  # Android adaptive icon (API 26+): AllTec-Anthrazit-Hintergrund + Gold-Emblem.
  adaptive_icon_background: "#13161B"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  # Kein zusätzlicher Inset: der Sicherheitsrand steckt schon im foreground-SVG
  # (Emblem ~57 % der Fläche). Sonst würde doppelt eingerückt → Emblem zu klein.
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
