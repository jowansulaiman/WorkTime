<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!--
    Content Security Policy als zweite Verteidigungslinie gegen XSS.
    Abgestimmt auf Flutter-Web (CanvasKit benötigt 'wasm-unsafe-eval') und den
    Firebase-Stack (Firestore/Auth/Functions in europe-west3, Google Sign-In).
    WICHTIG: Vor jedem Produktiv-Deploy gegen einen echten `flutter build web`
    + Login-Flow smoke-testen – eine zu enge CSP zeigt sonst nur einen weißen
    Bildschirm. frame-ancestors wird zusätzlich per HTTP-Header (X-Frame-Options:
    DENY in firebase.json) gesetzt, da ein Meta-Tag das nicht kann.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com https://apis.google.com https://accounts.google.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https:;
    font-src 'self' data: https://fonts.gstatic.com;
    connect-src 'self' https://*.googleapis.com https://*.cloudfunctions.net https://*.firebaseio.com wss://*.firebaseio.com https://www.googleapis.com https://www.gstatic.com https://fonts.gstatic.com;
    frame-src 'self' https://*.firebaseapp.com https://accounts.google.com;
    object-src 'none';
    base-uri 'self'">
  <meta
    name="description"
    content="Arbeitszeiterfassung, Schichtplanung und Teamverwaltung in einer Anwendung.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="timework">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260406">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png?v=20260406"/>
  <link rel="shortcut icon" href="favicon.png?v=20260406"/>

  <title>timework</title>
  <link rel="manifest" href="manifest.json?v=20260406">
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      /* AllTec-Rebrand: warmer Off-White-Grund + Gold-Radiant (statt Blau). */
      background:
        radial-gradient(circle at top, rgba(179, 139, 67, 0.12), transparent 42%),
        #faf7ee;
    }

    @media (prefers-color-scheme: dark) {
      body {
        /* AllTec-Anthrazit-Grund + aufgehellter Gold-Radiant. */
        background:
          radial-gradient(circle at top, rgba(212, 168, 90, 0.16), transparent 42%),
          #0e1014;
      }
    }
  </style>
</head>
<body>
  <!--
    Bewusste Entscheidung (web-renderer-bundle-not-pinned): Es bleibt beim
    Flutter-Default-Bootstrap/-Renderer (CanvasKit/skwasm). Web ist nur eine von
    drei Plattformen und nicht der Haupt-Auslieferungsweg der 2-Läden-App; die
    --web-renderer-Wahl ist in aktuellen Flutter-Versionen ohnehin eingeschränkt.
    Nächster sinnvoller Schritt (erst bei spürbarer Startzeit): schwere
    Feature-Screens (ShiftPlanner, Reports/PDF) via `import '...' deferred as x;`
    + loadLibrary() lazy laden und vorab mit `flutter build web --analyze-size`
    messen — nicht ohne echte Messung überdimensionieren.

    You can customize the "flutter_bootstrap.js" script.
    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
